<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Links - Joshua Emmanuel</title>
    <meta name="description" content="Kumpulan tautan sosial media dan koneksi digital Joshua Emmanuel.">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="card-container">
        <header>
            <div class="profile-pic-container small">
                <!-- Foto profil akan diambil dari file lokal bernama profile.jpg -->
                <img src="profile.jpg" alt="Foto Profil" class="profile-pic">
            </div>
            <h1 class="name">My Connections</h1>
        </header>

        <main class="links-container">
            <!-- Link menuju WhatsApp -->
            <a href="https://wa.me/6285888184003" target="_blank" rel="noopener noreferrer" class="link-button whatsapp"
                id="link-wa">
                <span class="icon"><i class="fa-brands fa-whatsapp"></i></span> Chat me on WhatsApp
            </a>

            <!-- Link menuju Instagram -->
            <a href="https://instagram.com/emm11113" target="_blank" rel="noopener noreferrer"
                class="link-button instagram" id="link-ig">
                <span class="icon"><i class="fa-brands fa-instagram"></i></span> My Instagram
            </a>

            <!-- Link menuju GitHub -->
            <a href="https://github.com/jojoE2412" target="_blank" rel="noopener noreferrer" class="link-button github"
                id="link-gh">
                <span class="icon"><i class="fa-brands fa-github"></i></span> My GitHub
            </a>

            <!-- Link menuju LinkedIn -->
            <a href="https://www.linkedin.com/in/joshua-emmanuel-b70540377" target="_blank" rel="noopener noreferrer"
                class="link-button linkedin" id="link-li">
                <span class="icon"><i class="fa-brands fa-linkedin-in"></i></span> My LinkedIn
            </a>

            <!-- Tombol navigasi kembali ke Home -->
            <a href="index.html" class="nav-button back-button" id="link-back">&larr; Back to Home</a>
        </main>
    </div>
</body>

</html>
